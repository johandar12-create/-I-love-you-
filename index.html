<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I love you</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let W, H, CX, CY, SCALE;
        const DPR = Math.min(window.devicePixelRatio || 1, 2);
        const text = "I love you";
        const TOTAL = 95;
        const points = [];

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * DPR;
            canvas.height = H * DPR;
            ctx.scale(DPR, DPR);
            CX = W / 2;
            CY = H / 2;
            SCALE = Math.min(W, H) * 0.014;
        }

        function heart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * SCALE, y: -y * SCALE };
        }

        for (let i = 0; i < TOTAL; i++) {
            points.push({ t: (i / TOTAL) * Math.PI * 2, phase: Math.random() * Math.PI * 2 });
        }

        window.addEventListener("resize", resize);
        resize();

        function animate(time) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, W, H);

            points.forEach(p => {
                const beat = Math.sin(time / 200 + p.phase) * 3;
                const pos = heart(p.t);
                const x = CX + pos.x + (pos.x / SCALE) * beat;
                const y = CY + pos.y + (pos.y / SCALE) * beat;

                ctx.fillStyle = "#ff78be";
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff78be";
            ctx.fillText(text, CX, CY);
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>

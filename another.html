<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Heart Vortex</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let W, H, CX, CY, SCALE;
        const text = "I love you";
        const TOTAL_POINTS = 250; // Más puntos para que el túnel se vea lleno
        const particles = [];

        function resize() {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W; canvas.height = H;
            CX = W / 2; CY = H / 2;
            SCALE = Math.min(W, H) * 0.015;
        }

        function heart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * SCALE, y: -y * SCALE };
        }

        for (let i = 0; i < TOTAL_POINTS; i++) {
            particles.push({
                t: (i / TOTAL_POINTS) * Math.PI * 2, // Posición en el corazón
                angle: Math.random() * Math.PI * 2,   // Ángulo de giro en el "tubo"
                speed: 0.02 + Math.random() * 0.03    // Velocidad del giro
            });
        }

        window.addEventListener("resize", resize);
        resize();

        function animate(time) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.fillRect(0, 0, W, H);

            particles.forEach(p => {
                p.angle += 0.05; // Velocidad del giro lateral perimetral

                const corePos = heart(p.t);
                const tubeRadius = 25; // Qué tan "ancho" es el anillo lateral
                
                // Matemáticas para el giro 3D (Vórtice)
                const x3d = corePos.x + Math.cos(p.angle) * tubeRadius;
                const z3d = Math.sin(p.angle) * tubeRadius;
                const y3d = corePos.y + z3d * 0.5; // Inclinación para dar perspectiva

                // Perspectiva simple
                const s = (z3d + 100) / 100; 
                const x = CX + x3d * s;
                const y = CY + y3d * s;

                ctx.save();
                ctx.translate(x, y);
                ctx.scale(s, s);
                ctx.rotate(p.t + Math.PI / 2); // Alineación con el borde
                
                ctx.font = `bold ${10 * s}px Arial`;
                ctx.fillStyle = `hsla(${330 + z3d}, 100%, 70%, ${(z3d + 25) / 50 + 0.2})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#ff78be";
                
                ctx.fillText(text, 0, 0);
                ctx.restore();
            });

            requestAnimationFrame(animate);
        }
        animate(0);
    </script>
</body>
</html>
